steps:
  # Step 1: Build Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/casan-frontend:latest",
        ".",
        "--build-arg",
        "VITE_API_URL=${_VITE_API_URL}",
        "--build-arg",
        "VITE_GOOGLE_MAPS_API_KEY=${_VITE_GOOGLE_MAPS_API_KEY}",Ø
      ]

  # Step 2: Push the image to Google Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/casan-frontend:latest"]

  # Step 3: Deploy the image to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    args:
      - "gcloud"
      - "run"
      - "deploy"
      - "casan-frontend"
      - "--image"
      - "gcr.io/$PROJECT_ID/casan-frontend:latest"
      - "--platform"
      - "managed"
      - "--region"
      - "asia-southeast2"
      - "--allow-unauthenticated"
      "--set-env-vars"
      - "VITE_API_URL=${_VITE_API_URL},VITE_GOOGLE_MAPS_API_KEY=${_VITE_GOOGLE_MAPS_API_KEY}"

images:
  - "gcr.io/$PROJECT_ID/casan-frontend:latest"
