name: GKE CI/CD

on:
  push:
    branches:
      - staging 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Google Cloud SDK
      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_key: ${{ secrets.GCP_KEY_JSON }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Check service account email from GCP_KEY_JSON
        run: |
          echo "${{ secrets.GCP_KEY_JSON }}" | jq -r .client_email


      - name: Authenticate to Google Cloud
        run: gcloud auth activate-service-account --key-file=${{ secrets.GCP_KEY_JSON }}


      # Step 3: Configure Docker to use GCP Artifact Registry
      - name: Configure Docker authentication
        run: gcloud auth configure-docker asia-southeast2-docker.pkg.dev

      - name: Login Docker
        run: |
          ACCESS_TOKEN=$(gcloud auth print-access-token)
          echo $ACCESS_TOKEN | docker login -u oauth2accesstoken --password-stdin https://asia-southeast2-docker.pkg.dev

      # Step 4: Build and push Docker image
      - name: Build and push Docker image
        run: |
          IMAGE_NAME=asia-southeast2-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/casan-frontend/casan-frontend:latest
          docker build -t $IMAGE_NAME .
          docker push $IMAGE_NAME

      # Step 5: Deploy to GKE
      - name: Deploy to GKE
        run: |
          kubectl config use-context gke_${{ secrets.GCP_PROJECT_ID }}_asia-southeast2-b_gke-casan-cluster
          kubectl set image deployment/casan casan=$IMAGE_NAME
